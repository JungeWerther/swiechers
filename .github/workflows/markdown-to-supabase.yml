# Markdown → Supabase monitor
#
# Whenever a markdown file is added or changed in a push to `main`, this workflow
# hands the file(s) to Claude (via the Claude Code GitHub Action) and asks it to
# upload each one into the Supabase `notes` table by calling the
# `ingest_markdown_note(user_id, source_path, content)` function.
#
# That function is the whole versioning brain:
#   - source_path (the file path) is the stable pointer to a document;
#   - it computes an unsalted sha256 of the content as the dedupe/version key;
#   - identical content for a path is a no-op (returns the existing row);
#   - changed content is inserted as the next version (append-only, history kept).
# Each new version is a plain INSERT, so the existing on-insert pipelines
# (classify → category/tags via Claude Haiku, embed → embedding via DigitalOcean)
# encode every version automatically — no orchestration here.
#
# Deletions are ignored. Edits flow through as new versions; unchanged files are
# skipped by the hash guard, so re-runs never create duplicate notes.
#
# ── Required repository configuration ────────────────────────────────────────
# Secrets (Settings → Secrets and variables → Actions → Secrets):
#   ANTHROPIC_API_KEY     Anthropic API key the Claude Code Action runs with.
#   SUPABASE_ACCESS_TOKEN Supabase personal access token for the Supabase MCP
#                         server (create one at https://supabase.com/dashboard
#                         → Account → Access Tokens).
#
# Variables (optional — Settings → Secrets and variables → Actions → Variables):
#   SUPABASE_PROJECT_REF      Defaults to bhewgqnzhyllvxcdmjrd (the notes project).
#   SUPABASE_NOTES_USER_ID    auth.users id that owns the inserted notes.
#                             Defaults to 380bda09-6ba5-473b-a6bc-f1d4f5db71ba
#                             (notes.user_id is NOT NULL with an auth.users FK, and
#                             SQL run via the MCP server has no auth.uid(), so the
#                             owner must be passed explicitly).

name: Markdown → Supabase

on:
  push:
    branches: [main]
    paths:
      - '**/*.md'

# Avoid concurrent runs racing to insert the same notes.
concurrency:
  group: markdown-to-supabase-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  upload-markdown:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so we can diff this push against its parent.
          fetch-depth: 0

      - name: Detect added or changed markdown files
        id: detect
        run: |
          set -euo pipefail

          before="${{ github.event.before }}"
          empty_tree="$(git hash-object -t tree /dev/null)"

          # `before` is all-zeros for a brand-new branch, and may point at a
          # commit we don't have; fall back to HEAD's parent, then the empty tree.
          if [ -z "$before" ] \
            || [ "$before" = "0000000000000000000000000000000000000000" ] \
            || ! git cat-file -e "${before}^{commit}" 2>/dev/null; then
            if git rev-parse --verify -q HEAD~1 >/dev/null; then
              before="$(git rev-parse HEAD~1)"
            else
              before="$empty_tree"
            fi
          fi

          # Added + modified markdown. The DB function dedupes unchanged content,
          # so re-listing a file that didn't really change is harmless.
          changed="$(git diff --name-only --diff-filter=AM "$before" "${{ github.sha }}" -- '*.md' '**/*.md' || true)"

          echo "Added/changed markdown files:"
          echo "${changed:-<none>}"

          {
            echo "files<<__EOF__"
            echo "$changed"
            echo "__EOF__"
          } >> "$GITHUB_OUTPUT"

          if [ -n "$changed" ]; then
            echo "has_files=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_files=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload added/changed markdown to Supabase
        if: steps.detect.outputs.has_files == 'true'
        uses: anthropics/claude-code-action@v1
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Markdown files were added or changed in this push. For EACH file path
            listed below, read the file and hand its contents to the Supabase
            `notes` table by calling the `ingest_markdown_note` function once, then
            stop.

            Files (one path per line):
            ${{ steps.detect.outputs.files }}

            For each file, run exactly this with the Supabase MCP `execute_sql`
            tool. Use dollar-quoting so the markdown body needs no escaping:

              select public.ingest_markdown_note(
                '${{ vars.SUPABASE_NOTES_USER_ID || '380bda09-6ba5-473b-a6bc-f1d4f5db71ba' }}'::uuid,
                $note_path$<FILE PATH>$note_path$,
                $note_body$<VERBATIM FILE CONTENTS>$note_body$
              );

            Rules:
            - 2nd arg = the file path exactly as listed (e.g. docs/foo.md). This is
              the stable pointer; the function keys versions off it.
            - 3rd arg = the full, verbatim contents of the file.
            - Call the function once per file; do not skip or merge files. The
              function itself handles hashing, dedupe, and version numbering —
              unchanged content is a no-op and changed content becomes a new
              version, so you do NOT need to check for duplicates yourself.
            - If a file's body contains the dollar-quote tag, pick a different,
              unused tag for that call.
            - Do NOT write raw INSERTs, modify files, create migrations, alter
              schema, or touch any table directly. Only call ingest_markdown_note.
              Classify + embed run automatically on each new version.
            - After all calls succeed, briefly report which files became new
              versions and which were unchanged (the function returns the row).
          claude_args: |
            --max-turns 20
            --allowedTools "Read,mcp__supabase__execute_sql"
            --mcp-config '{"mcpServers":{"supabase":{"command":"npx","args":["-y","@supabase/mcp-server-supabase@latest","--project-ref=${{ vars.SUPABASE_PROJECT_REF || 'bhewgqnzhyllvxcdmjrd' }}"],"env":{"SUPABASE_ACCESS_TOKEN":"${SUPABASE_ACCESS_TOKEN}"}}}}'
