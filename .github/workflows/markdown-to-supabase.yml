# Markdown → Supabase monitor
#
# Whenever a markdown file is ADDED in a push to `main`, this workflow hands the
# new file(s) to Claude (via the Claude Code GitHub Action) and asks it to upload
# each one into the Supabase `notes` table. Inserting a note automatically fires
# the existing on-insert pipelines (classify → category/tags via Claude Haiku,
# embed → embedding via DigitalOcean), so uploaded markdown is classified and
# embedded for semantic search with no extra work here.
#
# Only newly *added* `.md` files are uploaded (edits and deletions are ignored),
# so re-running or amending existing docs won't create duplicate notes.
#
# ── Required repository configuration ────────────────────────────────────────
# Secrets (Settings → Secrets and variables → Actions → Secrets):
#   ANTHROPIC_API_KEY     Anthropic API key the Claude Code Action runs with.
#   SUPABASE_ACCESS_TOKEN Supabase personal access token for the Supabase MCP
#                         server (create one at https://supabase.com/dashboard
#                         → Account → Access Tokens).
#
# Variables (optional — Settings → Secrets and variables → Actions → Variables):
#   SUPABASE_PROJECT_REF      Defaults to bhewgqnzhyllvxcdmjrd (the notes project).
#   SUPABASE_NOTES_USER_ID    auth.users id that owns the inserted notes.
#                             Defaults to 380bda09-6ba5-473b-a6bc-f1d4f5db71ba
#                             (notes.user_id is NOT NULL with an auth.users FK, and
#                             SQL run via the MCP server has no auth.uid(), so the
#                             owner must be passed explicitly).

name: Markdown → Supabase

on:
  push:
    branches: [main]
    paths:
      - '**/*.md'

# Avoid concurrent runs racing to insert the same notes.
concurrency:
  group: markdown-to-supabase-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  upload-markdown:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so we can diff this push against its parent.
          fetch-depth: 0

      - name: Detect added markdown files
        id: detect
        run: |
          set -euo pipefail

          before="${{ github.event.before }}"
          empty_tree="$(git hash-object -t tree /dev/null)"

          # `before` is all-zeros for a brand-new branch, and may point at a
          # commit we don't have; fall back to HEAD's parent, then the empty tree.
          if [ -z "$before" ] \
            || [ "$before" = "0000000000000000000000000000000000000000" ] \
            || ! git cat-file -e "${before}^{commit}" 2>/dev/null; then
            if git rev-parse --verify -q HEAD~1 >/dev/null; then
              before="$(git rev-parse HEAD~1)"
            else
              before="$empty_tree"
            fi
          fi

          added="$(git diff --name-only --diff-filter=A "$before" "${{ github.sha }}" -- '*.md' '**/*.md' || true)"

          echo "Added markdown files:"
          echo "${added:-<none>}"

          {
            echo "files<<__EOF__"
            echo "$added"
            echo "__EOF__"
          } >> "$GITHUB_OUTPUT"

          if [ -n "$added" ]; then
            echo "has_files=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_files=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload added markdown to Supabase
        if: steps.detect.outputs.has_files == 'true'
        uses: anthropics/claude-code-action@v1
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            New markdown files were added to the repository in this push. For EACH
            file path listed below, read the file and upload its contents to the
            Supabase `notes` table as exactly one new row, then stop.

            Files (one path per line):
            ${{ steps.detect.outputs.files }}

            For each file, insert one note with the Supabase MCP `execute_sql`
            tool. Use dollar-quoting so the markdown body needs no escaping:

              insert into public.notes (user_id, title, content)
              values (
                '${{ vars.SUPABASE_NOTES_USER_ID || '380bda09-6ba5-473b-a6bc-f1d4f5db71ba' }}',
                $note_title$<FILE PATH>$note_title$,
                $note_body$<VERBATIM FILE CONTENTS>$note_body$
              );

            Rules:
            - title = the file path exactly as listed (e.g. docs/foo.md).
            - content = the full, verbatim contents of the file.
            - Insert one row per file; do not skip, merge, or deduplicate files.
            - If a file's body contains the dollar-quote tag, pick a different,
              unused tag for that statement.
            - Do NOT modify any files, create migrations, alter schema, or touch any
              table other than `public.notes`. The classify and embed pipelines run
              automatically on insert — do not call them yourself.
            - After all inserts succeed, briefly report which files you uploaded.
          claude_args: |
            --max-turns 20
            --allowedTools "Read,mcp__supabase__execute_sql"
            --mcp-config '{"mcpServers":{"supabase":{"command":"npx","args":["-y","@supabase/mcp-server-supabase@latest","--project-ref=${{ vars.SUPABASE_PROJECT_REF || 'bhewgqnzhyllvxcdmjrd' }}"],"env":{"SUPABASE_ACCESS_TOKEN":"${SUPABASE_ACCESS_TOKEN}"}}}}'
